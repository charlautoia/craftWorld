<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraftWorld — Analyse</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
  .tab-btn { transition: all .2s; }
  .tab-btn.active { background: #6366f1; color: white; }
  th { cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { background: #334155; }
  th.sorted-asc::after  { content: ' ↑'; color: #818cf8; }
  th.sorted-desc::after { content: ' ↓'; color: #818cf8; }
  tr:hover td { background: #1e293b; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .positive { color: #4ade80; }
  .negative { color: #f87171; }
  .neutral  { color: #94a3b8; }
  input[type=text], select {
    background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
    border-radius: .375rem; padding: .375rem .75rem;
  }
  input[type=text]:focus, select:focus { outline: 2px solid #6366f1; border-color: transparent; }
  table { border-collapse: collapse; width: 100%; }
  td, th { padding: .5rem .75rem; border-bottom: 1px solid #1e293b; font-size: .85rem; }
  th { background: #1e293b; color: #94a3b8; text-transform: uppercase; font-size: .75rem; letter-spacing: .05em; position: sticky; top: 0; z-index: 10; }
  .badge { display: inline-block; padding: .1rem .4rem; border-radius: .25rem; font-size: .7rem; font-weight: 600; }
</style>
</head>
<body class="min-h-screen p-4">

<div class="max-w-screen-xl mx-auto">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-indigo-400">CraftWorld</h1>
      <p class="text-slate-400 text-sm">Game Data officiel + prix live — Ronin Network</p>
    </div>
    <div class="flex items-center gap-3">
      <span id="price-status" class="text-sm text-slate-400"></span>
      <button id="refresh-btn" onclick="fetchAllPrices()"
        class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
        ↻ Rafraîchir les prix
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex gap-2 mb-4">
    <button class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium bg-slate-700" onclick="showTab('renta')">Prix</button>
    <button class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700" onclick="showTab('crafting')">Crafting</button>
  </div>

  <!-- ── TAB RENTA ─────────────────────────────────────────────────────────── -->
  <div id="tab-renta">
    <div class="flex gap-3 mb-3 items-center">
      <input type="text" id="renta-filter" placeholder="Filtrer par ressource…" class="w-56"
             oninput="renderRenta()">
      <label class="flex items-center gap-2 text-sm text-slate-400">
        <input type="checkbox" id="only-pool" onchange="renderRenta()" class="accent-indigo-500">
        Avec pool seulement
      </label>
      <span class="text-slate-500 text-sm" id="renta-count"></span>
    </div>
    <div class="rounded-xl overflow-hidden border border-slate-700">
      <div class="overflow-x-auto max-h-[70vh] overflow-y-auto">
        <table id="renta-table">
          <thead>
            <tr>
              <th>Niveau</th>
              <th onclick="sortRenta('name')">Ressource</th>
              <th onclick="sortRenta('prix_live')">Prix live (COIN)</th>
              <th onclick="sortRenta('d24')">24h</th>
              <th onclick="sortRenta('w1')">1 sem.</th>
              <th onclick="sortRenta('coinh')">coin/h</th>
              <th>Mastery</th>
              <th>Speed bonus</th>
              <th>Pool</th>
            </tr>
          </thead>
          <tbody id="renta-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── TAB CRAFTING ──────────────────────────────────────────────────────── -->
  <div id="tab-crafting" class="hidden">
    <div class="flex gap-3 mb-3 items-center">
      <select id="resource-select" onchange="renderCrafting()" class="w-48"></select>
      <span class="text-slate-500 text-sm" id="crafting-info"></span>
    </div>
    <div class="rounded-xl overflow-hidden border border-slate-700">
      <div class="overflow-x-auto max-h-[70vh] overflow-y-auto">
        <table id="crafting-table">
          <thead>
            <tr>
              <th>Niveau</th>
              <th>Output</th>
              <th>Durée</th>
              <th>Input 1</th>
              <th>Qté 1</th>
              <th>Input 2</th>
              <th>Qté 2</th>
              <th>Power</th>
              <th>XP</th>
            </tr>
          </thead>
          <tbody id="crafting-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // Cache-bust : coinh.js puis app.js toujours à jour (évite tout décalage de version avec data.json).
  (function () {
    var v = '?v=' + Date.now();
    var s1 = document.createElement('script');
    s1.src = 'coinh.js' + v;
    s1.onload = function () {
      var s2 = document.createElement('script');
      s2.src = 'app.js' + v;
      document.body.appendChild(s2);
    };
    document.body.appendChild(s1);
  })();
</script>
</body>
</html>
