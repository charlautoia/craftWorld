<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CraftWorld — Prix courant</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
  th { cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { background: #334155; }
  th.sorted-asc::after  { content: ' ↑'; color: #818cf8; }
  th.sorted-desc::after { content: ' ↓'; color: #818cf8; }
  tr:hover td { background: #1e293b; }
  table { border-collapse: collapse; width: 100%; }
  td, th { padding: .5rem .75rem; border-bottom: 1px solid #1e293b; font-size: .9rem; }
  th { background: #1e293b; color: #94a3b8; text-transform: uppercase; font-size: .75rem; letter-spacing: .05em; position: sticky; top: 0; }
  .positive { color: #4ade80; }
  .negative { color: #f87171; }
  .neutral  { color: #94a3b8; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="min-h-screen p-4">

<div class="max-w-3xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-indigo-400">CraftWorld — Prix courant</h1>
      <p class="text-slate-400 text-sm">Prix en COIN — Ronin / GeckoTerminal</p>
    </div>
    <div class="flex items-center gap-3">
      <span id="status" class="text-sm text-slate-400"></span>
      <button id="refresh-btn" onclick="refresh()"
        class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
        ↻ Rafraîchir
      </button>
    </div>
  </div>

  <div class="rounded-xl overflow-hidden border border-slate-700">
    <div class="overflow-x-auto max-h-[80vh] overflow-y-auto">
      <table id="price-table">
        <thead>
          <tr>
            <th onclick="sortBy('name')">Ressource</th>
            <th onclick="sortBy('price')" class="text-right">Prix (COIN)</th>
            <th onclick="sortBy('change')" class="text-right">Var 24h</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const POOL_API = 'https://api.geckoterminal.com/api/v2/networks/ronin/pools/multi/';
let ROWS = [];                         // { name, pool, price, change }
let sort = { key: 'price', dir: -1 };  // prix décroissant par défaut

const fmtPrice = v => v == null ? '—'
  : Number(v).toLocaleString('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 8 });

const fmtChange = v => {
  if (v == null) return '<span class="neutral">—</span>';
  const cls = v > 0 ? 'positive' : v < 0 ? 'negative' : 'neutral';
  const sign = v > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${Number(v).toFixed(2)} %</span>`;
};

function render() {
  document.querySelectorAll('#price-table th').forEach(th => th.classList.remove('sorted-asc', 'sorted-desc'));
  const idx = ['name', 'price', 'change'].indexOf(sort.key);
  if (idx >= 0) document.querySelectorAll('#price-table th')[idx]
    .classList.add(sort.dir === 1 ? 'sorted-asc' : 'sorted-desc');

  const rows = [...ROWS].sort((a, b) => {
    let av = a[sort.key], bv = b[sort.key];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'string') return av.localeCompare(bv) * sort.dir;
    return (av - bv) * sort.dir;
  });

  document.getElementById('body').innerHTML = rows.map(r => `<tr>
    <td class="font-semibold text-white">${r.name}</td>
    <td class="text-right font-mono ${r.price == null ? 'neutral' : 'text-amber-300'}">
      ${r.price == null ? '<span class="spin neutral">⟳</span>' : fmtPrice(r.price)}</td>
    <td class="text-right font-mono">${fmtChange(r.change)}</td>
  </tr>`).join('');
}

function sortBy(key) {
  if (sort.key === key) sort.dir *= -1;
  else { sort.key = key; sort.dir = key === 'name' ? 1 : -1; }
  render();
}

async function refresh() {
  const btn = document.getElementById('refresh-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Chargement…';

  try {
    const pools = ROWS.map(r => r.pool);
    const res = await fetch(POOL_API + pools.join(','), {
      headers: { 'Accept': 'application/json;version=20230302' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    // Index par adresse de pool (en minuscules) → prix
    const byPool = {};
    for (const p of json.data) {
      const a = p.attributes;
      byPool[a.address.toLowerCase()] = {
        price: parseFloat(a.base_token_price_quote_token),
        change: a.price_change_percentage ? parseFloat(a.price_change_percentage.h24) : null,
      };
    }

    let ok = 0;
    for (const r of ROWS) {
      const d = byPool[r.pool.toLowerCase()];
      if (d) { r.price = d.price; r.change = d.change; ok++; }
      else { r.price = null; r.change = null; }
    }

    const now = new Date().toLocaleTimeString('fr-FR');
    status.textContent = `✓ ${ok}/${ROWS.length} prix — ${now}`;
  } catch (e) {
    status.textContent = `Erreur : ${e.message}`;
    console.error(e);
  } finally {
    btn.disabled = false;
    render();
  }
}

async function init() {
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    ROWS = data.renta
      .filter(r => r.pool && r.name)
      .map(r => ({ name: r.name, pool: r.pool, price: null, change: null }));
    render();
    refresh();
  } catch (e) {
    document.body.innerHTML += `<div class="fixed bottom-4 right-4 bg-red-900 text-red-200 p-4 rounded-xl text-sm">
      Erreur chargement data.json : ${e.message}<br>
      Ouvre cette page via un serveur local (ex : <code>python -m http.server</code>)
    </div>`;
  }
}

init();
</script>
</body>
</html>
